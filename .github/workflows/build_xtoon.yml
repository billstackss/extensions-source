name: Build Xtoon APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 🛠️ 이 단계가 추가되어 띄어쓰기 오류를 로봇이 스스로 고치게 만듭니다.
      - name: Fix Code Formatting
        run: ./gradlew spotlessApply

      - name: Build Xtoon
        run: ./gradlew :src:ko:xtoon:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xtoon-apk
          path: "**/*.apk"
