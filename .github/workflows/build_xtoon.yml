name: Build and Deploy Xtoon Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix Code Formatting
        run: ./gradlew spotlessApply

      - name: Build Xtoon
        run: ./gradlew :src:ko:xtoon:assembleDebug

      # 🌐 주소판 구조 완벽 세팅 (Komikku 및 Mihon 공용 규격)
      - name: Create Repo Structure
        run: |
          mkdir -p repo_dist/apk
          find src/ko/xtoon/build/outputs/apk/ -name "*.apk" -exec cp {} repo_dist/apk/xtoon-debug.apk \;
          echo '{"name":"Xtoon Custom Repo","extensions":[{"name":"Xtoon","pkg":"eu.kanade.tachiyomi.extension.ko.xtoon","apk":"xtoon-debug.apk","versionCode":1,"version":"1.0","nsfw":1,"lang":"ko"}]}' > repo_dist/index.min.json

      # 🚀 생성된 주소판을 별도의 'repo' 공간에 강제 업로드
      - name: Deploy to repo branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: repo_dist
          branch: repo
          token: ${{ secrets.GITHUB_TOKEN }}
